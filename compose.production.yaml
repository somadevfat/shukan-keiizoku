services:
  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: syukan_counter
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORDを設定してください}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d syukan_counter"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ${APP_IMAGE:?APP_IMAGEを設定してください}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URLを設定してください}
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRETを設定してください}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:?AUTH_GOOGLE_IDを設定してください}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:?AUTH_GOOGLE_SECRETを設定してください}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URLを設定してください}
      AUTH_TRUST_HOST: "true"
      AUTH_BYPASS_LOCAL_USER: "false"
      AUTH_BYPASS_REQUIRE_HEADER: "false"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAINを設定してください}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
