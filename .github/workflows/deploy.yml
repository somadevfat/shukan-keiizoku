name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: postgresql://build:build@localhost:5432/build
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: リリースタグとmain所属を検証
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "SemVer形式のタグ vMAJOR.MINOR.PATCH を使用してください。" >&2
            exit 1
          fi
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: リリース前品質チェック
        run: |
          npm install --global npm@11.6.2
          npm ci
          npm run db:generate
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test:unit:coverage
          npm audit --audit-level=high
          npm run build

      - name: コンテナイメージ名を設定
        id: image
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:$RELEASE_TAG"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "SHA_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "LATEST_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - name: GitHub Container Registry にログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: コンテナイメージを build / push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.SHA_IMAGE }}
            ${{ env.LATEST_IMAGE }}

  deploy:
    needs: build
    runs-on:
      - self-hosted
      - production
    environment: production
    env:
      DEPLOY_DIR: /opt/syukan-counter-todo
      IMAGE: ${{ needs.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: production設定を配置
        run: |
          install -d -m 700 "$DEPLOY_DIR/deploy" "$DEPLOY_DIR/scripts"
          install -m 600 compose.production.yaml "$DEPLOY_DIR/compose.production.yaml"
          install -m 600 deploy/Caddyfile "$DEPLOY_DIR/deploy/Caddyfile"
          install -m 700 scripts/validate-production-config.sh "$DEPLOY_DIR/validate-production-config.sh"
          install -m 700 scripts/backup-production-db.sh "$DEPLOY_DIR/scripts/backup-production-db.sh"
          install -m 700 scripts/restore-production-db.sh "$DEPLOY_DIR/scripts/restore-production-db.sh"

      - name: production設定を検査
        run: |
          cd "$DEPLOY_DIR"
          ./validate-production-config.sh

      - name: OCI Compute へデプロイ
        run: |
          cd "$DEPLOY_DIR"
          APP_IMAGE="$IMAGE" docker compose --env-file .env.production -f compose.production.yaml \
            up -d --pull always --remove-orphans --wait --wait-timeout 180

      - name: デプロイ失敗を診断
        if: failure()
        run: |
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.production -f compose.production.yaml ps || true
          docker compose --env-file .env.production -f compose.production.yaml logs --tail=200 app db caddy || true
          docker inspect syukan-counter-todo-app-1 --format '{{json .State.Health}}' || true
